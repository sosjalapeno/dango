name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package DMG
        run: bash Scripts/package_dmg.sh Dango_Installer.dmg

      - name: Publish installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dango_Installer.dmg
          generate_release_notes: true
